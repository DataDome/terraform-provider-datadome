---
name: test
on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-test:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: run unit tests
        run: make test
  acc-test:
    name: acceptance tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: run acceptance tests
        run: make testacc
